# Test application properties for integration tests
spring.application.name=composite-integration-test

# Composite library configuration
composite.base-path=/api/composite
composite.controller.enabled=true
composite.header-injection.enabled=true
composite.request-timeout=PT60S
composite.max-sub-requests-per-composite=25

# Security configuration for testing
composite.security.additional-auth-headers=X-Trace-Id,X-Span-Id,X-Request-Id

# Loopback configuration
composite.loopback.protocol=http
composite.loopback.connect-timeout=PT5S
composite.loopback.response-timeout=PT10S
